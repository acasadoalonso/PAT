  # /etc/fail2ban/filter.d/nginx-login.conf                                                                                           
   
  [Definition]                                                                                                                        
                                                                                                                                      
  # Option: failregex                                                                                                                 
  # Notes: Matches failed login attempts in nginx access/error logs                                                                   
  failregex = ^<HOST> -.*"(POST|GET) /login.*" (401|403)                                                                              
              ^<HOST> -.*"(POST|GET) /wp-login\.php.*" (200|401|403)                                                                  
              ^<HOST> -.*"(POST|GET) /admin.*" (401|403)                                                                              
                                                                                                                                      
  # Option: ignoreregex                                                                                                               
  ignoreregex =                                                                                                                       
                                                                                                                                    
  [Init]
  # Use nginx access log by default
  journalmatch =                                                                                                                      
   

