# Notes:
#   HOSTNAME must be set to the IP address of the host machine, not localhost, for the containers to communicate with each other and with the host. You can find this IP address using `ip addr` on Linux or `ipconfig` on Windows.
# See .env.example for required environment variables.
# USE the following command to set the HOSTNAME:
# echo $USER
# export HOSTNAME=$(hostname -I | awk '{ print $1 }' | tail -n1)
# echo $HOSTNAME


services:
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    user: ${APP_UID}:${APP_GID}
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./grafana/loki-config.yaml:/etc/loki/local-config.yaml

  pat_server:
    container_name: pat_server
    user: ${APP_UID}:${APP_GID}
    build:
      context: .
      dockerfile: Dockerfile.server
      tags:
        - $DOCK_USER/pat_server
    restart: unless-stopped
    ports:
      - ${API_PORT}:${API_PORT}
    hostname: pat_server
    environment:
      - ROOT=/prox/proxdata
      - AUTH_SERVER_URL=http://${AUTH_HOSTNAME}:${AUTH_PORT}
      - API_PORT=${API_PORT}
      - CORS_ORIGINS=http://${CLIENT_HOSTNAME}:${GUI_PORT},http://localhost:${GUI_PORT}
      - KC_CLIENT_SECRET=${KC_CLIENT_SECRET}
      - LOKI_HOST=http://loki:3100
    extra_hosts:
      - "${HOSTNAME}:host-gateway"
    volumes:
      - ./proxdata:/prox/proxdata
    develop:
      watch:
        - action: sync+restart
          path: ./Server
          target: /prox/Server
          ignore:
            - node_modules/
        - action: rebuild
          path: ./Dockerfile.server
    depends_on:
      - keycloak

  pat_client:
    container_name: pat_client
    build:
      context: ../patClient
      dockerfile: Dockerfile.client
      tags:
        - $DOCK_USER/pat_client
      args:
        - REACT_APP_AUTH_SERVER_URL=http://${AUTH_HOSTNAME}:${AUTH_PORT}
        - REACT_APP_API_URL=http://${SERVER_HOSTNAME}:${API_PORT}
        - REACT_APP_CESIUM_ION_TOKEN=${CESIUM_ION_TOKEN}
        - REACT_APP_GRAFANA_URL=http://${GRAFANA_HOSTNAME}:${GRAFANA_PORT}
    restart: unless-stopped
    ports:
      - ${GUI_PORT}:${GUI_PORT}
    hostname: pat_client
    develop:
      watch:
        - action: rebuild
          path: ../patClient/src
        - action: rebuild
          path: ../patClient/public
        - action: rebuild
          path: ../patClient/package.json
        - action: rebuild
          path: ../patClient/Dockerfile.client
    depends_on:
      - keycloak

  postgres:
    image: postgres:latest
    container_name: postgres
    user: ${APP_UID}:${APP_GID}
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: ${KC_POSTGRES_DB}
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - ./proxdata/postgres:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KC_DB_USER} -d ${KC_POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s # Gives the DB time to initialize before checks start
  
  keycloak:
    image: quay.io/keycloak/keycloak:${KC_VERSION}
    container_name: keycloak
    user: ${APP_UID}:${APP_GID}
    restart: always
    environment:
      KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME}
      KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/${KC_POSTGRES_DB}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HTTP_ENABLED: true
      KC_LOG_LEVEL: INFO
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_IMPORT: /opt/keycloak/data/import/realm-config.json
      KC_HEALTH_ENABLED: true
      KC_HOSTNAME: http://${AUTH_HOSTNAME}:${AUTH_PORT}
      HOSTNAME: ${AUTH_HOSTNAME}
      AUTH_HOSTNAME: ${AUTH_HOSTNAME}
      CLIENT_HOSTNAME: ${CLIENT_HOSTNAME}
      SERVER_HOSTNAME: ${SERVER_HOSTNAME}
      GRAFANA_HOSTNAME: ${GRAFANA_HOSTNAME}
      API_PORT: ${API_PORT}
      GUI_PORT: ${GUI_PORT}
      GRAFANA_PORT: ${GRAFANA_PORT}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      GRAFANA_OAUTH_CLIENT_SECRET: ${GRAFANA_OAUTH_CLIENT_SECRET}
      # KC_HOSTNAME_BACKCHANNEL_DYNAMIC: true
      # KC_HOSTNAME_STRICT_BACKCHANNEL: false
      # KC_HOSTNAME_STRICT_HTTPS: false
      # KC_HTTPS_CERTIFICATE_FILE: /etc/x509/https/tls.crt
      # KC_HTTPS_CERTIFICATE_KEY_FILE: /etc/x509/https/tls.key
    ports:
      - ${AUTH_PORT}:8080
    volumes:
      - ./realm-config.json:/opt/keycloak/data/import/realm-config.json
    #   - "/etc/ssl/keycloak/:/etc/x509/https" # map certificates to container
    command: ["start-dev", "--import-realm"]
      # - start
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep 'HTTP/1.1 200 OK' <&3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - ${GRAFANA_PORT}:3000
    environment:
      - GF_SERVER_ROOT_URL=http://${GRAFANA_HOSTNAME}:${GRAFANA_PORT}
      - GF_SECURITY_COOKIE_SAMESITE=lax
      - GF_AUTH_OAUTH_AUTO_LOGIN=true
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Editor
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Keycloak
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=grafana
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OAUTH_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email roles
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=http://${AUTH_HOSTNAME}:${AUTH_PORT}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/userinfo
      - GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH=sub
      - GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH=preferred_username
      - GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH=email
      - GF_AUTH_GENERIC_OAUTH_SKIP_ORG_ROLE_SYNC=true
      - GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN=true
      - GF_AUTH_SIGNOUT_REDIRECT_URL=http://${AUTH_HOSTNAME}:${AUTH_PORT}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/logout?post_logout_redirect_uri=http://${GRAFANA_HOSTNAME}:${GRAFANA_PORT}/login
      - KC_POSTGRES_DB=${KC_POSTGRES_DB}
      - KC_DB_USER=${KC_DB_USER}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - keycloak

volumes:
  postgres-data:
  grafana-data:

networks:
  default:
    name: cpas
    external: true
